<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Ficha detalhada de cultivo de orquídeas."
    >

    <title>Ficha da Orquídea</title>

    <link
        rel="stylesheet"
        href="estilos.css?v=32"
    >
</head>

<body>

    <header class="cabecalho">

        <div class="conteudo-cabecalho">

            <div class="icone-cabecalho" aria-hidden="true">
                🌸
            </div>

            <div>

                <h1>
                    Ficha da Orquídea
                </h1>

                <p>
                    Catálogo particular cultivado em Serra/ES
                </p>

            </div>

        </div>

    </header>

    <main class="container">

        <a
            class="voltar"
            href="index.html"
        >
            ← Voltar ao catálogo
        </a>

        <article
            id="ficha"
            class="ficha-detalhada"
        ></article>

        <div
            id="ficha-nao-encontrada"
            class="sem-resultados"
        >

            <span
                class="icone-sem-resultados"
                aria-hidden="true"
            >
                🌱
            </span>

            <h3>
                Orquídea não encontrada
            </h3>

            <p>
                Não foi possível localizar esta espécie no catálogo.
            </p>

        </div>

    </main>

    <footer class="rodape">

        <p>
            Catálogo particular de orquídeas
        </p>

        <span>
            Cultivado em Serra/ES
        </span>

    </footer>

    <script
        type="module"
        src="ficha.js"
    ></script>

</body>
</html>
