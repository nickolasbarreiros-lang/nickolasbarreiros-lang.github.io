<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Catálogo particular de orquídeas cultivadas em Serra, Espírito Santo."
    >

    <title>Meu Catálogo de Orquídeas</title>

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header class="cabecalho">
        <h1>Meu Catálogo de Orquídeas</h1>

        <p>
            Coleção particular cultivada em Serra/ES
        </p>
    </header>

    <main class="container">

        <section class="painel-filtros">

            <input
                id="busca"
                class="campo"
                type="search"
                placeholder="Pesquisar pelo nome da orquídea..."
            >

            <select id="filtro-genero" class="campo">
                <option value="">Todos os gêneros</option>
            </select>

            <select id="filtro-tipo" class="campo">
                <option value="">Espécies e híbridos</option>
                <option value="Espécie botânica">
                    Espécies botânicas
                </option>
                <option value="Híbrido">
                    Híbridos
                </option>
            </select>

        </section>

        <p id="contador" class="contador"></p>

        <section id="catalogo" class="catalogo"></section>

        <div id="sem-resultados" class="sem-resultados">
            Nenhuma orquídea encontrada.
        </div>

    </main>

    <footer class="rodape">
        Catálogo particular de orquídeas
    </footer>

    <script src="dados/orquideas.js"></script>
    <script src="catalogo.js"></script>

</body>
</html>
